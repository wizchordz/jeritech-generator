workflows:
  android-apk:
    name: JERITECH Generator — Android APK
    max_build_duration: 90
    environment:
      java: 17
      node: 20
      vars:
        # Prevent corepack from enforcing the builder machine's package manager
        # (Codemagic builder has "packageManager":"yarn" in /Users/builder/package.json)
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Install pnpm
        script: |
          corepack disable 2>/dev/null || true
          npm install -g pnpm@9 --force
          pnpm --version

      - name: Install workspace dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (generate native Android project)
        script: |
          cd artifacts/mobile
          # Use the locally installed expo binary (already in node_modules from pnpm install)
          # Avoids npx downloading a different version and avoids corepack interference
          ./node_modules/.bin/expo prebuild --platform android --clean --no-install

      - name: Generate release keystore
        script: |
          keytool -genkeypair -v \
            -keystore "$HOME/jeritech-release.keystore" \
            -alias jeritech \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass jeritech2024 \
            -keypass jeritech2024 \
            -dname "CN=JERITECH,OU=Mobile,O=JERITECH Generator,L=Houston,ST=TX,C=US"

      - name: Build Release APK
        script: |
          cd artifacts/mobile/android
          chmod +x ./gradlew
          # arm64-v8a only: smaller APK, covers all modern Android phones
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$HOME/jeritech-release.keystore" \
            -Pandroid.injected.signing.store.password=jeritech2024 \
            -Pandroid.injected.signing.key.alias=jeritech \
            -Pandroid.injected.signing.key.password=jeritech2024 \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon \
            --stacktrace 2>&1 | tail -200

    artifacts:
      - artifacts/mobile/android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - wisdomjeremiah6@gmail.com
        notify:
          success: true
          failure: true
