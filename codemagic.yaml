workflows:
  android-apk:
    name: JERITECH Generator — Android APK
    max_build_duration: 90
    environment:
      java: 17
      node: 20
    scripts:
      - name: Install pnpm
        script: |
          # Codemagic builder machines have a system package.json with
          # "packageManager": "yarn", causing corepack to block pnpm.
          # Disable corepack enforcement before doing anything with pnpm.
          corepack disable 2>/dev/null || true
          export COREPACK_ENABLE_STRICT=0
          npm install -g pnpm@9 --force
          pnpm --version

      - name: Install workspace dependencies
        script: |
          export COREPACK_ENABLE_STRICT=0
          # --no-frozen-lockfile: avoids lockfile mismatch errors in CI
          # with pnpm workspaces that have local workspace: references
          pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (generate native Android project)
        script: |
          export COREPACK_ENABLE_STRICT=0
          cd artifacts/mobile
          # npx expo is more reliable than pnpm exec expo in CI
          npx expo prebuild --platform android --clean

      - name: Generate release keystore
        script: |
          keytool -genkeypair -v \
            -keystore "$HOME/jeritech-release.keystore" \
            -alias jeritech \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass jeritech2024 \
            -keypass jeritech2024 \
            -dname "CN=JERITECH,OU=Mobile,O=JERITECH Generator,L=Houston,ST=TX,C=US"

      - name: Build Release APK
        script: |
          cd artifacts/mobile/android
          chmod +x ./gradlew
          # Build arm64 only to keep APK small and fast
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$HOME/jeritech-release.keystore" \
            -Pandroid.injected.signing.store.password=jeritech2024 \
            -Pandroid.injected.signing.key.alias=jeritech \
            -Pandroid.injected.signing.key.password=jeritech2024 \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon

    artifacts:
      - artifacts/mobile/android/app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - wisdomjeremiah6@gmail.com
        notify:
          success: true
          failure: true
