name: Build Android APK

# Runs automatically on every push to main, or manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build JERITECH Generator APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ───────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install workspace dependencies
        # minimumReleaseAge is a local supply-chain policy; the lockfile is
        # already pinned so it is safe to bypass the age check in CI.
        run: pnpm install --frozen-lockfile --config.minimumReleaseAge=0

      # ── 4. Generate native Android project from Expo config ───────────────
      - name: Expo Prebuild (generate Android folder)
        working-directory: artifacts/mobile
        run: pnpm exec expo prebuild --platform android --clean --no-install

      # ── 5. Code signing — generate a release keystore on the fly ──────────
      #   For a production Play Store upload you would store a real keystore in
      #   GitHub Secrets instead. For sideloaded / internal APKs this is fine.
      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/jeritech-release.keystore" \
            -alias jeritech \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass jeritech2024 \
            -keypass  jeritech2024 \
            -dname "CN=JERITECH,OU=Mobile,O=JERITECH Generator,L=Houston,ST=TX,C=US"

      # ── 6. Build ───────────────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: artifacts/mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/jeritech-release.keystore" \
            -Pandroid.injected.signing.store.password=jeritech2024 \
            -Pandroid.injected.signing.key.alias=jeritech \
            -Pandroid.injected.signing.key.password=jeritech2024 \
            -PreactNativeArchitectures=arm64-v8a \
            --no-daemon

      # ── 7. Upload APK as downloadable artifact ─────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jeritech-generator-${{ github.run_number }}
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
